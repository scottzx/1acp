version: 2

registries:
  npmjs:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  - package-ecosystem: npm
    directory: /
    registries:
      - npmjs
    schedule:
      interval: daily
    cooldown:
      default-days: 2
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 2
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
